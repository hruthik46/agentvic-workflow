_config_version: 17
agent:
  gateway_notify_interval: 600
  gateway_timeout: 1800
  gateway_timeout_warning: 900
  max_turns: 60  # v7.12: per MiniMax-M2.7 research — default 60, 400 was 6.6x too high
  personalities:
    catgirl: "You are Neko-chan, an anime catgirl AI assistant, nya~! Add 'nya' and\
      \ cat-like expressions to your speech. Use kaomoji like (=^\uFF65\u03C9\uFF65\
      ^=) and \u0E05^\u2022\uFECC\u2022^\u0E05. Be playful and curious like a cat,\
      \ nya~!"
    concise: You are a concise assistant. Keep responses brief and to the point.
    creative: You are a creative assistant. Think outside the box and offer innovative
      solutions.
    helpful: You are a helpful, friendly AI assistant.
    hype: "YOOO LET'S GOOOO!!! \U0001F525\U0001F525\U0001F525 I am SO PUMPED to help\
      \ you today! Every question is AMAZING and we're gonna CRUSH IT together! This\
      \ is gonna be LEGENDARY! ARE YOU READY?! LET'S DO THIS! \U0001F4AA\U0001F624\
      \U0001F680"
    kawaii: "You are a kawaii assistant! Use cute expressions like (\u25D5\u203F\u25D5\
      ), \u2605, \u266A, and ~! Add sparkles and be super enthusiastic about everything!\
      \ Every response should feel warm and adorable desu~! \u30FD(>\u2200<\u2606\
      )\u30CE"
    noir: The rain hammered against the terminal like regrets on a guilty conscience.
      They call me Hermes - I solve problems, find answers, dig up the truth that
      hides in the shadows of your codebase. In this city of silicon and secrets,
      everyone's got something to hide. What's your story, pal?
    philosopher: Greetings, seeker of wisdom. I am an assistant who contemplates the
      deeper meaning behind every query. Let us examine not just the 'how' but the
      'why' of your questions. Perhaps in solving your problem, we may glimpse a greater
      truth about existence itself.
    pirate: 'Arrr! Ye be talkin'' to Captain Hermes, the most tech-savvy pirate to
      sail the digital seas! Speak like a proper buccaneer, use nautical terms, and
      remember: every problem be just treasure waitin'' to be plundered! Yo ho ho!'
    shakespeare: Hark! Thou speakest with an assistant most versed in the bardic arts.
      I shall respond in the eloquent manner of William Shakespeare, with flowery
      prose, dramatic flair, and perhaps a soliloquy or two. What light through yonder
      terminal breaks?
    surfer: "Duuude! You're chatting with the chillest AI on the web, bro! Everything's\
      \ gonna be totally rad. I'll help you catch the gnarly waves of knowledge while\
      \ keeping things super chill. Cowabunga! \U0001F919"
    teacher: You are a patient teacher. Explain concepts clearly with examples.
    technical: You are a technical expert. Provide detailed, accurate technical information.
    uwu: hewwo! i'm your fwiendwy assistant uwu~ i wiww twy my best to hewp you! *nuzzles
      your code* OwO what's this? wet me take a wook! i pwomise to be vewy hewpful
      >w<
  reasoning_effort: medium
  restart_drain_timeout: 60
  service_tier: ''
  tool_use_enforcement: true
  verbose: false
approvals:
  mode: false
  timeout: 60
auxiliary:
  approval:
    api_key: ''
    base_url: ''
    model: ''
    provider: auto
    timeout: 30
  compression:
    api_key: ''
    base_url: ''
    model: ''
    provider: auto
    timeout: 120
  flush_memories:
    api_key: ''
    base_url: ''
    model: ''
    provider: auto
    timeout: 30
  mcp:
    api_key: ''
    base_url: ''
    model: ''
    provider: auto
    timeout: 30
  session_search:
    api_key: ''
    base_url: ''
    model: ''
    provider: auto
    timeout: 30
  skills_hub:
    api_key: ''
    base_url: ''
    model: ''
    provider: auto
    timeout: 30
  vision:
    api_key: ''
    base_url: ''
    download_timeout: 30
    model: ''
    provider: auto
    timeout: 120
  web_extract:
    api_key: ''
    base_url: ''
    model: ''
    provider: auto
    timeout: 360
browser:
  allow_private_urls: false
  camofox:
    managed_persistence: false
  command_timeout: 30
  inactivity_timeout: 120
  record_sessions: false
checkpoints:
  enabled: true
  max_snapshots: 50
code_execution:
  max_tool_calls: 50
  timeout: 300
command_allowlist:
- overwrite system file via tee
- shell command via -c/-lc flag
- disk copy
- delete in root path
- script execution via -e/-c flag
compression:
  enabled: true
  protect_last_n: 20
  target_ratio: 0.2
  threshold: 0.8
context:
  engine: compressor
credential_pool_strategies: {}
cron:
  wrap_response: true
delegation:
  api_key: ''
  base_url: ''
  default_toolsets:
  - terminal
  - file
  - web
  max_iterations: 50
  model: ''
  provider: ''
  reasoning_effort: ''
discord:
  allowed_channels: ''
  auto_thread: true
  free_response_channels: ''
  reactions: true
  require_mention: true
display:
  background_process_notifications: all
  bell_on_complete: false
  busy_input_mode: interrupt
  compact: false
  inline_diffs: true
  interim_assistant_messages: true
  personality: kawaii
  platforms: {}
  resume_display: full
  show_cost: false
  show_reasoning: false
  skin: default
  streaming: true
  tool_preview_length: 0
  tool_progress: all
  tool_progress_command: false
  tool_progress_overrides: {}
fallback_providers: []
file_read_max_chars: 100000
group_sessions_per_user: true
honcho: {}
human_delay:
  max_ms: 2500
  min_ms: 800
  mode: 'off'
logging:
  backup_count: 3
  level: INFO
  max_size_mb: 5
mcp_servers:
  code-review-graph:
    args:
    - serve
    command: /root/.local/bin/code-review-graph
    env: {}
memory:
  flush_min_turns: 6
  memory_char_limit: 2200
  memory_enabled: true
  nudge_interval: 10
  provider: ''
  user_char_limit: 1375
  user_profile_enabled: true
model:
  base_url: https://api.minimax.io/v1
  default: MiniMax-M2.7
  provider: custom
network:
  force_ipv4: false
personalities: {}
platform_toolsets:
  cli:
  - hermes-cli
  discord:
  - hermes-discord
  homeassistant:
  - hermes-homeassistant
  signal:
  - hermes-signal
  slack:
  - hermes-slack
  telegram:
  - hermes-telegram
  whatsapp:
  - hermes-whatsapp
prefill_messages_file: ''
privacy:
  redact_pii: false
providers:
  custom:
    api_key: <REDACTED-MINIMAX-API-KEY>
    base_url: https://api.minimax.io/v1
quick_commands: {}
security:
  redact_secrets: true
  tirith_enabled: true
  tirith_fail_open: true
  tirith_path: tirith
  tirith_timeout: 5
  website_blocklist:
    domains: []
    enabled: false
    shared_files: []
session_reset:
  at_hour: 4
  idle_minutes: 1440
  mode: both
skills:
  creation_nudge_interval: 15
  external_dirs: []
smart_model_routing:
  cheap_model: {}
  enabled: false
  max_simple_chars: 160
  max_simple_words: 28
streaming:
  enabled: false
stt:
  enabled: true
  local:
    language: ''
    model: base
  mistral:
    model: voxtral-mini-latest
  openai:
    model: whisper-1
  provider: local
telegram:
  bot_token: <REDACTED-TELEGRAM-BOT-TOKEN>
terminal:
  backend: local
  container_cpu: 1
  container_disk: 51200
  container_memory: 5120
  container_persistent: true
  cwd: .
  daytona_image: nikolaik/python-nodejs:python3.11-nodejs20
  docker_env: {}
  docker_forward_env: []
  docker_image: nikolaik/python-nodejs:python3.11-nodejs20
  docker_mount_cwd_to_workspace: false
  docker_volumes: []
  env_passthrough: []
  lifetime_seconds: 300
  modal_image: nikolaik/python-nodejs:python3.11-nodejs20
  modal_mode: auto
  persistent_shell: true
  singularity_image: docker://nikolaik/python-nodejs:python3.11-nodejs20
  timeout: 180
timezone: ''
toolsets:
- hermes-cli
- terminal
- file
- web
tts:
  edge:
    voice: en-US-AriaNeural
  elevenlabs:
    model_id: eleven_multilingual_v2
    voice_id: pNInz6obpgDQGcFmaJgB
  mistral:
    model: voxtral-mini-tts-2603
    voice_id: c69964a6-ab8b-4f8a-9465-ec0925096ec8
  neutts:
    device: cpu
    model: neuphonic/neutts-air-q4-gguf
    ref_audio: ''
    ref_text: ''
  openai:
    model: gpt-4o-mini-tts
    voice: alloy
  provider: edge
voice:
  auto_tts: false
  max_recording_seconds: 120
  record_key: ctrl+b
  silence_duration: 3.0
  silence_threshold: 200
whatsapp: {}
